worker_processes  1;
error_log  /data/data/com.termux/files/home/lilymac-hub/logs/nginx_error.log;
pid        /data/data/com.termux/files/home/lilymac-hub/logs/nginx.pid;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080;

        root /data/data/com.termux/files/home/lilymac-hub/frontend/build;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location /app/ {
            proxy_pass http://127.0.0.1:5000/app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /vipadmin/ {
            proxy_pass http://127.0.0.1:5000/vipadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /bet/ {
            proxy_pass http://127.0.0.1:5000/bet/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
